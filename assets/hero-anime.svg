<svg width="1200" height="520" viewBox="0 0 1200 520" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#150826"/>
      <stop offset="55%" stop-color="#0d051a"/>
      <stop offset="100%" stop-color="#05020c"/>
    </linearGradient>
    <linearGradient id="nameGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff2d95"/>
      <stop offset="50%" stop-color="#c74bff"/>
      <stop offset="100%" stop-color="#00e5ff"/>
    </linearGradient>
    <radialGradient id="burst" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff2d95" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ff2d95" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="520" rx="20" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="519" rx="20" fill="none" stroke="#3a1a52"/>

  <!-- sakura petals drifting -->
  <g opacity="0.75">
    <ellipse rx="6" ry="3.5" fill="#ff6fb1"><animateMotion dur="10s" repeatCount="indefinite" rotate="auto" path="M60,500 C300,420 200,200 900,40"/></ellipse>
    <ellipse rx="5" ry="3" fill="#c74bff"><animateMotion dur="12s" repeatCount="indefinite" rotate="auto" path="M1150,480 C900,400 700,200 150,60"/></ellipse>
    <ellipse rx="5.5" ry="3" fill="#00e5ff"><animateMotion dur="9s" repeatCount="indefinite" rotate="auto" path="M40,60 C400,150 700,60 1140,340"/></ellipse>
    <ellipse rx="4.5" ry="2.6" fill="#ff6fb1"><animateMotion dur="14s" repeatCount="indefinite" rotate="auto" path="M1180,120 C900,260 500,120 80,420"/></ellipse>
    <ellipse rx="5" ry="3" fill="#c74bff"><animateMotion dur="11s" repeatCount="indefinite" rotate="auto" path="M200,20 C500,220 850,180 1020,470"/></ellipse>
    <ellipse rx="4" ry="2.4" fill="#00e5ff"><animateMotion dur="13s" repeatCount="indefinite" rotate="auto" path="M1100,500 C850,380 400,420 120,140"/></ellipse>
  </g>

  <!-- window chrome -->
  <rect x="0" y="0" width="1200" height="42" rx="20" fill="#180a2c"/>
  <rect x="0" y="24" width="1200" height="18" fill="#180a2c"/>
  <circle cx="26" cy="21" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="21" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="21" r="6" fill="#27c93f"/>
  <text x="600" y="26" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" fill="#a97fd4">~/kushagra — 起動シェル</text>

  <!-- scan sweep -->
  <rect x="0" y="42" width="1200" height="2" fill="#ff2d95" opacity="0.25">
    <animate attributeName="y" values="42;478;42" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- boot lines -->
  <g font-family="JetBrains Mono, monospace" font-size="19">
    <g opacity="0">
      <text x="48" y="96"><tspan fill="#00e5ff">$</tspan><tspan fill="#f0e6ff"> whoami</tspan></text>
      <animate attributeName="opacity" to="1" begin="0.2s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="128" fill="#b79fd6">kushagra_srivastava · ml / dl / genai engineer</text>
      <animate attributeName="opacity" to="1" begin="0.6s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="168"><tspan fill="#00e5ff">$</tspan><tspan fill="#f0e6ff"> status --check</tspan><tspan fill="#6b5588">  // ステータス確認</tspan></text>
      <animate attributeName="opacity" to="1" begin="1.1s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="200"><tspan fill="#ff6fb1">[ok]</tspan><tspan fill="#b79fd6"> rag pipelines        </tspan><tspan fill="#ff6fb1">[ok]</tspan><tspan fill="#b79fd6"> langchain / langgraph</tspan></text>
      <animate attributeName="opacity" to="1" begin="1.5s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="228"><tspan fill="#ff6fb1">[ok]</tspan><tspan fill="#b79fd6"> catboost / xgboost   </tspan><tspan fill="#ff6fb1">[ok]</tspan><tspan fill="#b79fd6"> production ml</tspan></text>
      <animate attributeName="opacity" to="1" begin="1.8s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="268"><tspan fill="#00e5ff">$</tspan><tspan fill="#f0e6ff"> echo $CURRENTLY</tspan></text>
      <animate attributeName="opacity" to="1" begin="2.3s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <text x="48" y="300" fill="#b79fd6">ml intern @ prodigy infotech · building in public</text>
      <animate attributeName="opacity" to="1" begin="2.7s" dur="0.01s" fill="freeze"/>
    </g>
  </g>

  <!-- power-up burst behind name -->
  <g opacity="0">
    <circle cx="300" cy="378" r="10" fill="url(#burst)">
      <animate attributeName="r" from="10" to="260" begin="3.05s" dur="0.9s" fill="freeze"/>
    </circle>
    <g stroke="#ff2d95" stroke-width="2" opacity="0.5">
      <line x1="300" y1="378" x2="300" y2="378"><animate attributeName="x2" from="300" to="120" begin="3.05s" dur="0.5s" fill="freeze"/><animate attributeName="y2" from="378" to="260" begin="3.05s" dur="0.5s" fill="freeze"/></line>
      <line x1="300" y1="378" x2="300" y2="378"><animate attributeName="x2" from="300" to="480" begin="3.05s" dur="0.5s" fill="freeze"/><animate attributeName="y2" from="378" to="260" begin="3.05s" dur="0.5s" fill="freeze"/></line>
      <line x1="300" y1="378" x2="300" y2="378"><animate attributeName="x2" from="300" to="120" begin="3.05s" dur="0.5s" fill="freeze"/><animate attributeName="y2" from="378" to="480" begin="3.05s" dur="0.5s" fill="freeze"/></line>
      <line x1="300" y1="378" x2="300" y2="378"><animate attributeName="x2" from="300" to="480" begin="3.05s" dur="0.5s" fill="freeze"/><animate attributeName="y2" from="378" to="480" begin="3.05s" dur="0.5s" fill="freeze"/></line>
    </g>
    <animate attributeName="opacity" to="1" begin="3.05s" dur="0.01s" fill="freeze"/>
    <animate attributeName="opacity" values="1;0" begin="3.6s" dur="0.8s" fill="freeze"/>
  </g>

  <!-- name slides in -->
  <g opacity="0">
    <text x="48" y="392" font-family="JetBrains Mono, monospace" font-size="44" font-weight="800" fill="url(#nameGrad)" filter="url(#glow)">
      KUSHAGRA SRIVASTAVA
      <animateTransform attributeName="transform" type="translate" from="-1300 0" to="0 0" begin="3.1s" dur="0.9s" fill="freeze" calcMode="spline" keySplines="0.16 0.84 0.28 1"/>
    </text>
    <animate attributeName="opacity" to="1" begin="3.1s" dur="0.01s" fill="freeze"/>
  </g>

  <g opacity="0">
    <text x="50" y="424" font-family="JetBrains Mono, monospace" font-size="16" fill="#a97fd4">AI / ML ENGINEER — 起動完了 · SYSTEM ONLINE</text>
    <animate attributeName="opacity" to="1" begin="3.9s" dur="0.6s" fill="freeze"/>
  </g>

  <!-- CI checklist -->
  <g font-family="JetBrains Mono, monospace" font-size="15">
    <g opacity="0">
      <rect x="48" y="448" width="130" height="30" rx="15" fill="#180a2c" stroke="#3a1a52"/>
      <circle cx="66" cy="463" r="5" fill="#00e5ff"/>
      <text x="80" y="468" fill="#b79fd6">lint pass</text>
      <animate attributeName="opacity" to="1" begin="4.3s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <rect x="190" y="448" width="140" height="30" rx="15" fill="#180a2c" stroke="#3a1a52"/>
      <circle cx="208" cy="463" r="5" fill="#00e5ff"/>
      <text x="222" y="468" fill="#b79fd6">tests pass</text>
      <animate attributeName="opacity" to="1" begin="4.6s" dur="0.01s" fill="freeze"/>
    </g>
    <g opacity="0">
      <rect x="342" y="448" width="150" height="30" rx="15" fill="#2a0f3f" stroke="#ff2d95"/>
      <circle cx="360" cy="463" r="5" fill="#ff2d95">
        <animate attributeName="opacity" values="1;0.3;1" dur="1.1s" repeatCount="indefinite"/>
      </circle>
      <text x="374" y="468" fill="#ff9fce">status: live</text>
      <animate attributeName="opacity" to="1" begin="4.9s" dur="0.01s" fill="freeze"/>
    </g>
  </g>
</svg>
